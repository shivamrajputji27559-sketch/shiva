+=`<i<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{
background:linear-gradient(135deg,#0f172a,#1e293b);

}

<body>
<div class="app">

<div class="circle" id="circle">
<h1 id="day">1</h1>
<p>Days</p>
</div>

<div class="grid">
<div class="card" onclick="gym()">💪 GYM</div>
<div class="card" onclick="diet()">🥗 DIET</div>
<div class="card" onclick="ssc()">📚 SSC</div>
<div class="card" onclick="business()">💰 BUSINESS</div>
<div class="card" onclick="books()">📘 BOOKS</div>
</div>

</div>
</div>

<script>

// ===== DASHBOARD =====
let total=180;
let start=localStorage.getItem("start");
if(!start){start=new Date().toISOString();localStorage.setItem("start",start);}
let diff=Math.floor((new Date()-new Date(start))/(1000*60*60*24))+1;
if(diff>total) diff=total;
day.innerText=diff;
circle.style.background=`conic-gradient(#22c55e ${(diff/total)*100}%, #e5e7eb 0%)`;

function back(){location.reload();}

// ===== GYM =====
function gym(){
main.innerHTML=`
<h2>💪 6 Day Gym Split</h2>
<div class="progress" id="gProg"></div>

${makeDay("Day 1 - Chest",["Bench Press 4x8","Incline DB 3x10","Tricep Pushdown 3x12"])}
${makeDay("Day 2 - Back",["Pullups 4x8","Barbell Row 3x10","Bicep Curl 3x12"])}
${makeDay("Day 3 - Legs",["Squats 4x10","Leg Press 3x12","Calf Raise 4x15"])}
${makeDay("Day 4 - Shoulder",["Overhead Press 4x8","Lateral Raise 3x12","Rear Delt Fly 3x12"])}
${makeDay("Day 5 - Arms",["Hammer Curl 3x12","Tricep Dips 3x12"])}
${makeDay("Day 6 - Full Body",["Deadlift 4x6","Burpees 3x15","Pushups 3x20"])}

<button onclick="back()">⬅ Back</button>
`;
setupGym();
}

function makeDay(title,exercises){
let html=`<div class="box"><b>${title}</b>`;
exercises.forEach((e,i)=>{
html+=`<label><input type="checkbox" class="g"> ${e}</label><br>`;
});
html+=`</div>`;
return html;
}

function setupGym(){
let boxes=document.querySelectorAll(".g");
boxes.forEach((b,i)=>{
b.checked=localStorage.getItem("g"+i)==="true";
b.onchange=()=>{localStorage.setItem("g"+i,b.checked);updateGym();}
});
updateGym();
}

function updateGym(){
let b=document.querySelectorAll(".g");
let d=0;b.forEach(x=>{if(x.checked)d++;});
gProg.innerText="Workout Completed: "+Math.round((d/b.length)*100)+"%";
}

// ===== DIET =====
function diet(){
main.innerHTML=`
<h2>🥗 Muscle Gain Diet Plan</h2>

<div class="box">Mid Snack: Dahi / Banana / Apple</div>
<div class="box">Lunch: Normal Home Lunch + Extra Dahi</div>
<div class="box">Evening: Brown Bread + Peanut Butter</div>
<div class="box">Post Workout: Banana Shake + Creatine (5g)</div>

<div class="box">Dinner: Roti/Rice + Sabzi + Dal</div>
<div class="box">Before Bed: Milk + Banana</div>
<div class="box"><b>Protein Target: 2x Bodyweight (grams)</b></div>

<button onclick="back()">⬅ Back</button>
`;
}

// ===== SSC FULL SYLLABUS =====
function ssc(){
main.innerHTML=`
<h2>📚 SSC Complete Syllabus</h2>

${subject("1️⃣ General Intelligence & Reasoning",
["Analogy","Classification","Series (Number / Alphabet)","Coding–Decoding","Blood Relation","Direction & Distance","Venn Diagram","Syllogism","Statement & Conclusion","Seating Arrangement","Non-Verbal Reasoning","Mirror Image / Paper Folding","Embedded Figures","📌 MTS → Easy level","📌 CGL → Moderate to Tough level"])}

${subject("2️⃣ Quantitative Aptitude (Maths)",
["Number System","Simplification","Percentage","Profit & Loss","Discount","Simple & Compound Interest","Ratio & Proportion","Partnership","Average","Time & Work","Time, Speed & Distance","Algebra (basic for MTS, advanced for CGL)","Geometry","Mensuration","Trigonometry (mainly CGL)","Data Interpretation","📌 MTS → Basic maths","📌 CGL → Advanced maths"])}

${subject("3️⃣ English Comprehension",
["Reading Comprehension","Cloze Test","Error Detection","Sentence Improvement","Fill in the Blanks","Synonyms & Antonyms","One Word Substitution","Idioms & Phrases","Active & Passive Voice","Direct & Indirect Speech","Para Jumbles","📌 MTS → Basic grammar","📌 CGL → Moderate level"])}

${subject("4️⃣ General Awareness",
["History (Ancient / Medieval / Modern)","Geography (India & World)","Polity (Constitution / Parliament / Judiciary)","Economics (Budget / Banking / Inflation)","Physics","Chemistry","Biology","Static GK","Current Affairs (6–8 months important)","📌 MTS → Static + Basic CA","📌 CGL → Deep GK + Current Affairs"])}

<button onclick="back()">⬅ Back</button>
`;
}

function subject(title,topics){
let t="";
topics.forEach(x=>{t+=`<div>• ${x}</div>`});
return `<div class="subject" onclick="toggle(this)">${title}</div>
<div class="topics">${t}</div>`;
}

function toggle(el){
let next=el.nextElementSibling;
next.style.display=next.style.display==="block"?"none":"block";
}

// ===== BUSINESS =====
function business(){
main.innerHTML=`
<h2>💰 Business Tracker</h2>
<input id="rev" placeholder="Revenue">
<input id="ad" placeholder="Ad Spend">
<button onclick="calc()">Calculate</button>
<div id="profit"></div>

<h3>30 Winning Products</h3>
${products()}

<button onclick="back()">⬅ Back</button>
`;
}

function calc(){
let r=parseFloat(rev.value)||0;
let a=parseFloat(ad.value)||0;
profit.innerText="Profit ₹ "+(r-a);
}

function products(){
let h="";
for(let i=1;i<=30;i++){
h+=`<input placeholder="Product ${i}">`;
}
return h;
}

// ===== BOOKS =====
function books(){
main.innerHTML=`
<h2>📘 Book Link</h2>
<input id="bookLink" placeholder="Paste PDF Link">
<button onclick="saveBook()">Save</button>
<div id="savedBook"></div>
<button onclick="back()">⬅ Back</button>
`;
let saved=localStorage.getItem("book");
if(saved){savedBook.innerHTML=`<a href="${saved}" target="_blank">Open Book</a>`;}
}

function saveBook(){
localStorage.setItem("book",bookLink.value);
location.reload();
}

</script>

<script>

// ===== DARK MODE =====
let dark=false;
function toggleDark(){
dark=!dark;
document.body.style.background=dark?"#111":"linear-gradient(135deg,#0f172a,#1e293b)";
document.querySelector(".app").style.background=dark?"#1e293b":"white";
}

// ===== DASHBOARD =====
let total=180;
let start=localStorage.getItem("start");
if(!start){start=new Date().toISOString();localStorage.setItem("start",start);}
let diff=Math.floor((new Date()-new Date(start))/(1000*60*60*24))+1;
if(diff>total) diff=total;
day.innerText=diff;
circle.style.background=`conic-gradient(#22c55e ${(diff/total)*100}%, #e5e7eb 0%)`;

function back(){location.reload();}

// ===== GYM =====
function gym(){
main.innerHTML=`
<h2>💪 Gym Workout Plan</h2>
<div id="gProg" class="progress"></div>

${makeDay("Day 1: Chest, Shoulders, Triceps",
["Bench Press","Shoulder Press","Tricep Pushdown"])}

${makeDay("Day 2: Back & Biceps",
["Pullups","Barbell Row","Bicep Curl"])}

${makeDay("Day 3: Legs",
["Squats","Hamstring Curl","Calf Raise"])}

${makeDay("Day 4: Chest, Triceps, Shoulders",
["Incline Press","Dips","Lateral Raise"])}

${makeDay("Day 5: Back & Biceps",
["Deadlift","Lat Pulldown","Hammer Curl"])}

${makeDay("Day 6: Legs",
["Leg Press","Lunges","Wall Sit"])}

<h3>🏠 Home Workout</h3>
<div class="box">
Pushups 15 | Burpees 15 | Plank 1min | Jump Lunges 20
</div>

<button onclick="back()">⬅ Back</button>
`;
setupGym();
}

function makeDay(title,ex){
let h=`<div class="box"><b>${title}</b><br>`;
ex.forEach(e=>{h+=`<label><input type="checkbox" class="g"> ${e}</label><br>`});
h+=`</div>`;
return h;
}

function setupGym(){
let b=document.querySelectorAll(".g");
b.forEach((x,i)=>{
x.checked=localStorage.getItem("g"+i)==="true";
x.onchange=()=>{localStorage.setItem("g"+i,x.checked);updateGym();}
});
updateGym();
}
function updateGym(){
let b=document.querySelectorAll(".g");
let d=0;b.forEach(x=>{if(x.checked)d++;});
gProg.innerText="Workout Completed: "+Math.round((d/b.length)*100)+"%";
}

// ===== DIET =====
function diet(){
main.innerHTML=`
<h2>🥗 Diet Plan</h2>

<h3>VEG PLAN</h3>
<div class="box">
Oats 70g + 3 Banana + Paneer 100g<br>
Rice 300g + Soya 50g<br>
4 Roti + Sprouts + Potato<br>
4 Roti + Paneer Bhurji<br>
<b>Approx 3500 Calories</b>
</div>

<h3>NON-VEG PLAN</h3>
<div class="box">
Oats + Dry Fruits<br>
Peanut Butter Toast + Milk<br>
Brown Rice + Eggs<br>
Mass Gainer Shake<br>
Roti + Beans<br>
<b>Protein: Bodyweight × 2g</b>
</div>

<button onclick="back()">⬅ Back</button>
`;
}

// ===== SSC PREMIUM =====
function ssc(){
main.innerHTML=`
<h2>📚 SSC PREMIUM TRACKER</h2>

<div id="overall" class="progress"></div>
<div id="dailyTarget" class="progress"></div>

<button onclick="startTimer()">Start Exam Timer (60min)</button>
<div id="timer" class="progress"></div>

${makeSubject("Reasoning",["Analogy","Classification","Series","Coding","Blood Relation","Venn Diagram","Syllogism","Seating Arrangement"])}

${makeSubject("Maths",["Number System","Percentage","Profit & Loss","Ratio","Time & Work","Algebra","Geometry","Trigonometry"])}

${makeSubject("English",["Reading","Cloze Test","Error","Voice","Narration","Para Jumble"])}

${makeSubject("GA",["History","Polity","Geography","Economics","Physics","Chemistry","Biology","Current Affairs"])}

<button onclick="toggleDark()">🌙 Dark Mode</button>
<button onclick="back()">⬅ Back</button>
`;
setupSSC();
}

function makeSubject(name,topics){
let t="";
topics.forEach((x,i)=>{
t+=`<label><input type="checkbox" class="sscBox"> ${x}</label><br>`;
});
return `<div class="box"><b>${name}</b><br>${t}</div>`;
}

function setupSSC(){
let b=document.querySelectorAll(".sscBox");
b.forEach((x,i)=>{
x.checked=localStorage.getItem("ssc"+i)==="true";
x.onchange=()=>{localStorage.setItem("ssc"+i,x.checked);updateSSC();}
});
updateSSC();
}

function updateSSC(){
let b=document.querySelectorAll(".sscBox");
let d=0;b.forEach(x=>{if(x.checked)d++;});
overall.innerText="Overall Completion: "+Math.round((d/b.length)*100)+"%";

let today=d%5;
dailyTarget.innerText="Daily Target Completed: "+today+"/5";
}

// ===== EXAM TIMER =====
let interval;
function startTimer(){
let time=60*60;
interval=setInterval(()=>{
time--;
let min=Math.floor(time/60);
let sec=time%60;
timer.innerText="Time Left: "+min+":"+ (sec<10?"0":"")+sec;
if(time<=0) clearInterval(interval);
},1000);
}

// ===== BUSINESS =====
function business(){
main.innerHTML=`
<h2>💰 Business</h2>
<input id="rev" placeholder="Revenue">
<input id="ad" placeholder="Ad Spend">
<button onclick="calc()">Calculate</button>
<div id="profit"></div>
<h3>30 Winning Products</h3>
${makeProducts()}
<button onclick="back()">⬅ Back</button>
`;
}
function calc(){
let r=parseFloat(rev.value)||0;
let a=parseFloat(ad.value)||0;
profit.innerText="Profit ₹ "+(r-a);
}
function makeProducts(){
let h="";
for(let i=1;i<=30;i++){h+=`<input placeholder="Product ${i}">`}
return h;
}

</script>

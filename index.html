<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHIVAM 180 DAYS PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
display:flex;
justify-content:center;
color:#111;
}

.app{
width:100%;
max-width:420px;
background:white;
min-height:100vh;
border-radius:25px 25px 0 0;
overflow:hidden;
position:relative;
}

header{
background:#0f172a;
color:white;
padding:20px;
text-align:center;
font-weight:bold;
font-size:18px;
}

.section{padding:20px}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.card{
background:#f1f5f9;
padding:20px;
border-radius:18px;
text-align:center;
font-weight:bold;
cursor:pointer;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
transition:0.3s;
}
.card:hover{transform:scale(1.05)}

.box{
background:#f8fafc;
padding:15px;
border-radius:15px;
margin:10px 0;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.subject{
background:#e2e8f0;
padding:12px;
border-radius:12px;
margin-top:12px;
cursor:pointer;
font-weight:bold;
}

.topics{
display:none;
padding-left:10px;
margin-top:8px;
}

.exercise img{
width:100%;
border-radius:12px;
margin-top:8px;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
background:#0f172a;
color:white;
margin-top:15px;
}

</style>
</head>

<body>
<div class="app">
<header>🔥 SHIVAM 180 DAYS PRO</header>

<div class="section" id="main">

<div class="grid">
<div class="card" onclick="showGym()">💪 GYM</div>
<div class="card" onclick="showDiet()">🥗 DIET</div>
<div class="card" onclick="showSSC()">📚 SSC</div>
<div class="card" onclick="showBusiness()">💰 BUSINESS</div>
</div>

</div>
</div>

<script>

function back(){
location.reload();
}

// ===== GYM =====
function showGym(){
main.innerHTML=`
<h2>💪 6 Day Gym Split</h2>

${gymDay("Day 1 - Chest",
"Bench Press 4x8",
"https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif")}

${gymDay("Day 2 - Back",
"Pullups 4x8",
"https://media.giphy.com/media/3o7TKr3nzbh5WgCFxe/giphy.gif")}

${gymDay("Day 3 - Legs",
"Squats 4x10",
"https://media.giphy.com/media/26AHONQ79FdWZhAI0/giphy.gif")}

${gymDay("Day 4 - Shoulder",
"Overhead Press 4x8",
"https://media.giphy.com/media/3o7btPCcdNniyf0ArS/giphy.gif")}

${gymDay("Day 5 - Arms",
"Hammer Curl 3x12",
"https://media.giphy.com/media/3o7TKTDn976rzVgky4/giphy.gif")}

${gymDay("Day 6 - Full Body",
"Deadlift 4x6",
"https://media.giphy.com/media/l0MYC0LajbaPoEADu/giphy.gif")}

<button onclick="back()">⬅ Back</button>
`;
}

function gymDay(title,exercise,img){
return `
<div class="box exercise">
<b>${title}</b><br>
${exercise}
<img src="${img}">
</div>
`;
}

// ===== DIET =====
function showDiet(){
main.innerHTML=`
<h2>🥗 Muscle Gain Diet Plan</h2>

<div class="box">Meal 1: Oats 100g + Milk 300ml<br>600 Cal / 20g Protein</div>
<div class="box">Meal 2: Peanut Butter 2 tbsp + Bread 4 slice<br>500 Cal / 15g Protein</div>
<div class="box">Meal 3: Rice 250g + Dal + 4 Eggs<br>900 Cal / 40g Protein</div>
<div class="box">Meal 4: Banana + Almonds<br>400 Cal / 10g Protein</div>
<div class="box">Meal 5: Chicken 200g / Paneer 200g<br>800 Cal / 45g Protein</div>
<div class="box">Meal 6: Milk + Peanut<br>400 Cal / 15g Protein</div>

<b>Total: ~3600 Calories / 145g Protein</b>

<button onclick="back()">⬅ Back</button>
`;
}

// ===== SSC =====
function showSSC(){
main.innerHTML=`
<h2>📚 SSC Complete Syllabus</h2>

${subject("General Intelligence & Reasoning",
["Analogy","Series","Coding-Decoding","Blood Relation","Puzzle","Venn Diagram","Syllogism","Seating Arrangement"])}

${subject("Quantitative Aptitude",
["Number System","Percentage","Profit & Loss","Ratio","Average","Time & Work","Algebra","Geometry","Mensuration","Trigonometry"])}

${subject("English",
["Reading Comprehension","Cloze Test","Error Detection","Synonyms","Antonyms","Voice","Narration","Para Jumble"])}

${subject("General Awareness",
["History","Polity","Geography","Economics","Physics","Chemistry","Biology","Current Affairs"])}

<button onclick="back()">⬅ Back</button>
`;
}

function subject(title,topics){
let t="";
topics.forEach(x=>{
t+=`<div>• ${x}</div>`;
});
return `
<div class="subject" onclick="toggle(this)">${title}</div>
<div class="topics">${t}</div>
`;
}

function toggle(el){
let next=el.nextElementSibling;
next.style.display= next.style.display==="block"?"none":"block";
}

// ===== BUSINESS =====
function showBusiness(){
main.innerHTML=`
<h2>💰 Business Tracker</h2>

<input id="rev" placeholder="Revenue">
<input id="ad" placeholder="Ad Spend">
<button onclick="calc()">Calculate Profit</button>
<div id="profit"></div>

<h3>Winning Product List</h3>
${productLines(30)}

<button onclick="back()">⬅ Back</button>
`;
}

function calc(){
let r=parseFloat(rev.value)||0;
let a=parseFloat(ad.value)||0;
profit.innerText="Profit: ₹"+(r-a);
}

function productLines(n){
let h="";
for(let i=1;i<=n;i++){
h+=`<input placeholder="Product ${i}">`;
}
return h;
}

</script>
</body>
</html>

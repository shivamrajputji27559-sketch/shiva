<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHIVAM 180 DAYS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
background:linear-gradient(135deg,#1e1e2f,#2c2c54);
display:flex;
justify-content:center;
}

.app{
width:100%;
max-width:420px;
min-height:100vh;
background:white;
border-radius:25px 25px 0 0;
overflow:hidden;
position:relative;
}

header{
background:#111827;
color:white;
padding:20px;
text-align:center;
font-size:18px;
font-weight:bold;
}

.dashboard{
padding:20px;
}

.circle{
width:180px;
height:180px;
border-radius:50%;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
transition:0.3s;
}

.circle h1{
font-size:40px;
color:#111;
}

.circle p{
font-size:14px;
color:#555;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:25px;
}

.card{
background:#f9fafb;
padding:20px;
border-radius:20px;
text-align:center;
font-weight:bold;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.bottomNav{
position:fixed;
bottom:0;
width:100%;
max-width:420px;
display:flex;
justify-content:space-around;
background:white;
padding:15px 0;
box-shadow:0 -5px 15px rgba(0,0,0,0.1);
}

.bottomNav div{
font-size:20px;
}

.resetBtn{
margin-top:15px;
background:#ef4444;
color:white;
padding:8px 12px;
border:none;
border-radius:10px;
font-size:12px;
}
</style>
</head>

<body>

<div class="app">

<header>
🔥 SHIVAM 180 DAYS PREMIUM
</header>

<div class="dashboard">

<div class="circle" id="progressCircle">
<h1 id="dayNumber">1</h1>
<p>Days Completed</p>
</div>

<div style="text-align:center;">
<button class="resetBtn" onclick="resetMission()">Reset</button>
</div>

<div class="grid">
<div class="card">💪 GYM</div>
<div class="card">🥗 DIET</div>
<div class="card">📚 SSC</div>
<div class="card">💰 BUSINESS</div>
</div>

</div>

<div class="bottomNav">
<div>🏠</div>
<div>📘</div>
<div>🎯</div>
<div>⚙️</div>
</div>

</div>

<script>

let totalDays = 180;

// Get or Set Start Date
let startDate = localStorage.getItem("missionStart");

if(!startDate){
startDate = new Date().toISOString();
localStorage.setItem("missionStart", startDate);
}

// Calculate difference
let diff = Math.floor(
(new Date() - new Date(startDate)) / (1000*60*60*24)
) + 1;

if(diff > totalDays) diff = totalDays;

// Update number
document.getElementById("dayNumber").innerText = diff;

// Update circle
let percent = (diff / totalDays) * 100;

document.getElementById("progressCircle").style.background =
`conic-gradient(#4ade80 ${percent}%, #e5e7eb 0%)`;

// Reset function
function resetMission(){
localStorage.removeItem("missionStart");
location.reload();
}

</script>

</body>
</html>

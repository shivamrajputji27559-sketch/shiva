<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHIVAM 180 DAYS PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
display:flex;
justify-content:center;
}

.app{
width:100%;
max-width:420px;
background:white;
min-height:100vh;
border-radius:25px 25px 0 0;
overflow:hidden;
}

header{
background:#0f172a;
color:white;
padding:20px;
text-align:center;
font-weight:bold;
}

.section{padding:20px}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px
}

.card{
background:#f1f5f9;
padding:18px;
border-radius:18px;
text-align:center;
font-weight:bold;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.1)
}

.circle{
width:160px;
height:160px;
border-radius:50%;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
box-shadow:0 5px 15px rgba(0,0,0,0.2)
}

.box{
background:#f8fafc;
padding:12px;
border-radius:12px;
margin:10px 0
}

input{
width:100%;
padding:8px;
margin:6px 0;
border-radius:6px;
border:1px solid #ccc
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
background:#0f172a;
color:white;
margin-top:10px
}

.progress{
font-weight:bold;
margin:8px 0
}
</style>
</head>

<body>

<div class="app">

<header>🔥 SHIVAM 180 DAYS SYSTEM</header>

<div class="section" id="main">

<div class="circle" id="circle">
<h1 id="day">1</h1>
<p>Days</p>
</div>

<div class="grid">
<div class="card" onclick="showGym()">💪 GYM</div>
<div class="card" onclick="showDiet()">🥗 DIET</div>
<div class="card" onclick="showSSC()">📚 SSC</div>
<div class="card" onclick="showBusiness()">💰 BUSINESS</div>
<div class="card" onclick="showBooks()">📘 BOOKS</div>
</div>

</div>
</div>

<script>

// ===== DASHBOARD =====
const mainDiv=document.getElementById("main")
const dayEl=document.getElementById("day")
const circleEl=document.getElementById("circle")

let total=180
let start=localStorage.getItem("start")

if(!start){
start=new Date().toISOString()
localStorage.setItem("start",start)
}

let diff=Math.floor((new Date()-new Date(start))/(1000*60*60*24))+1
if(diff>total) diff=total

dayEl.innerText=diff

circleEl.style.background=
`conic-gradient(#22c55e ${(diff/total)*100}%, #e5e7eb 0%)`

function back(){location.reload()}


// ===== GYM =====
function showGym(){

mainDiv.innerHTML=`
<h2>💪 6 Day Gym Split</h2>
<div id="gProg" class="progress"></div>

${makeDay("Day 1 - Chest",["Bench Press","Incline DB","Pushdown"])}
${makeDay("Day 2 - Back",["Pullups","Barbell Row","Curl"])}
${makeDay("Day 3 - Legs",["Squats","Leg Press","Calf Raise"])}
${makeDay("Day 4 - Shoulder",["Overhead Press","Lateral Raise","Rear Fly"])}
${makeDay("Day 5 - Arms",["Hammer Curl","Dips"])}
${makeDay("Day 6 - Full Body",["Deadlift","Burpees","Pushups"])}

<button onclick="back()">⬅ Back</button>
`

setupGym()

}

function makeDay(title,ex){

let h=`<div class="box"><b>${title}</b><br>`

ex.forEach(e=>{
h+=`<label><input type="checkbox" class="g"> ${e}</label><br>`
})

h+=`</div>`

return h

}

function setupGym(){

let boxes=document.querySelectorAll(".g")

boxes.forEach((b,i)=>{

b.checked=localStorage.getItem("g"+i)==="true"

b.onchange=()=>{
localStorage.setItem("g"+i,b.checked)
updateGym()
}

})

updateGym()

}

function updateGym(){

let b=document.querySelectorAll(".g")

let d=0

b.forEach(x=>{
if(x.checked) d++
})

document.getElementById("gProg").innerText=
"Workout Completed: "+Math.round((d/b.length)*100)+"%"

}


// ===== DIET =====
function showDiet(){

mainDiv.innerHTML=`
<h2>🥗 Muscle Gain Diet</h2>

<div class="box">
Meal 1: Oats + Banana + Paneer
</div>

<div class="box">
Meal 2: Rice + Soya Chunks
</div>

<div class="box">
Meal 3: 4 Roti + Sprouts + Potato
</div>

<div class="box">
Meal 4: Paneer Bhurji + Roti
</div>

<b>Approx 3500 Calories</b>

<button onclick="back()">⬅ Back</button>
`

}


// ===== SSC FULL =====
function showSSC(){

mainDiv.innerHTML=`
<h2>📚 SSC FULL SYLLABUS</h2>

<div class="progress" id="sscOverall"></div>

<h3>1️⃣ General Intelligence & Reasoning</h3>
<div class="box">
${makeSSCList([
"Analogy","Classification","Series","Coding–Decoding","Blood Relation",
"Direction & Distance","Venn Diagram","Syllogism","Statement & Conclusion",
"Seating Arrangement","Non-Verbal Reasoning","Mirror Image","Embedded Figures"
])}
</div>

<h3>2️⃣ Quantitative Aptitude</h3>
<div class="box">
${makeSSCList([
"Number System","Simplification","Percentage","Profit & Loss","Discount",
"Simple Interest","Compound Interest","Ratio","Partnership","Average",
"Time & Work","Time Speed Distance","Algebra","Geometry","Mensuration",
"Trigonometry","Data Interpretation"
])}
</div>

<h3>3️⃣ English</h3>
<div class="box">
${makeSSCList([
"Reading Comprehension","Cloze Test","Error Detection","Sentence Improvement",
"Fill in the Blanks","Synonyms","Antonyms","One Word Substitution",
"Idioms & Phrases","Active Passive","Direct Indirect","Para Jumbles"
])}
</div>

<h3>4️⃣ General Awareness</h3>
<div class="box">
${makeSSCList([
"History","Geography","Polity","Economics","Physics",
"Chemistry","Biology","Static GK","Current Affairs"
])}
</div>

<h3>⏱ Exam Timer</h3>
<button onclick="startTimer()">Start 60 Min Timer</button>
<div id="timer"></div>

<button onclick="back()">⬅ Back</button>
`

setupSSC()

}

function makeSSCList(topics){
let h=""
topics.forEach(t=>{
h+=`<label><input type="checkbox" class="ssc"> ${t}</label><br>`
})
return h
}

function setupSSC(){

let boxes=document.querySelectorAll(".ssc")

boxes.forEach((b,i)=>{

b.checked=localStorage.getItem("ssc"+i)==="true"

b.onchange=()=>{
localStorage.setItem("ssc"+i,b.checked)
updateSSC()
}

})

updateSSC()

}

function updateSSC(){

let boxes=document.querySelectorAll(".ssc")

let done=0

boxes.forEach(b=>{
if(b.checked) done++
})

let percent=Math.round((done/boxes.length)*100)

document.getElementById("sscOverall").innerText=
"SSC Progress: "+percent+"%"

}

let interval

function startTimer(){

let time=60*60

interval=setInterval(()=>{

time--

let m=Math.floor(time/60)
let s=time%60

document.getElementById("timer").innerText=
"Time Left: "+m+":"+ (s<10?"0":"")+s

if(time<=0){
clearInterval(interval)
}

},1000)

}


// ===== BUSINESS =====
function showBusiness(){

mainDiv.innerHTML=`
<h2>💰 Business Tracker</h2>

<input id="rev" placeholder="Revenue">

<input id="ad" placeholder="Ad Spend">

<button onclick="calc()">Calculate</button>

<div id="profit"></div>

<h3>30 Winning Products</h3>

${makeProducts()}

<button onclick="back()">⬅ Back</button>
`

}

function calc(){

let r=parseFloat(document.getElementById("rev").value)||0
let a=parseFloat(document.getElementById("ad").value)||0

document.getElementById("profit").innerText="Profit ₹ "+(r-a)

}

function makeProducts(){

let h=""

for(let i=1;i<=30;i++){
h+=`<input placeholder="Product ${i}">`
}

return h

}


// ===== BOOKS =====
function showBooks(){

mainDiv.innerHTML=`
<h2>📘 Book Link</h2>

<input id="bookLink" placeholder="Paste PDF Link">

<button onclick="saveBook()">Save</button>

<div id="savedBook"></div>

<button onclick="back()">⬅ Back</button>
`

let saved=localStorage.getItem("book")

if(saved){

document.getElementById("savedBook").innerHTML=
`<a href="${saved}" target="_blank">Open Book</a>`

}

}

function saveBook(){

localStorage.setItem(
"book",
document.getElementById("bookLink").value
)

location.reload()

}

</script>

</body>
</html>

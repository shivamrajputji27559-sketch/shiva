<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHIVAM 180 DAYS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
background:linear-gradient(135deg,#1e1e2f,#2c2c54);
display:flex;
justify-content:center;
}

.app{
width:100%;
max-width:420px;
min-height:100vh;
background:white;
border-radius:25px 25px 0 0;
overflow:hidden;
position:relative;
}

header{
background:#111827;
color:white;
padding:20px;
text-align:center;
font-size:18px;
font-weight:bold;
}

.dashboard{
padding:20px;
}

.circle{
width:180px;
height:180px;
border-radius:50%;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
transition:0.3s;
}

.circle h1{
font-size:40px;
color:#111;
}

.circle p{
font-size:14px;
color:#555;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:25px;
}

.card{
background:#f9fafb;
padding:20px;
border-radius:20px;
text-align:center;
font-weight:bold;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
cursor:pointer;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
background:#111;
color:white;
margin-top:15px;
}

</style>
</head>

<body>

<div class="app">

<header>
🔥 SHIVAM 180 DAYS
</header>

<div class="dashboard" id="mainContent">

<div class="circle" id="progressCircle">
<h1 id="dayNumber">1</h1>
<p>Days Completed</p>
</div>

<div class="grid">
<div class="card" onclick="showGym()">💪 GYM</div>
<div class="card">🥗 DIET</div>
<div class="card">📚 SSC</div>
<div class="card">💰 BUSINESS</div>
</div>

</div>

</div>

<script>

// ===== 180 DAY SYSTEM =====

let totalDays = 180;

let startDate = localStorage.getItem("missionStart");

if(!startDate){
startDate = new Date().toISOString();
localStorage.setItem("missionStart", startDate);
}

let diff = Math.floor(
(new Date() - new Date(startDate)) / (1000*60*60*24)
) + 1;

if(diff > totalDays) diff = totalDays;

document.getElementById("dayNumber").innerText = diff;

let percent = (diff / totalDays) * 100;

document.getElementById("progressCircle").style.background =
`conic-gradient(#4ade80 ${percent}%, #e5e7eb 0%)`;


// ===== GYM MODULE =====

function showGym(){

document.getElementById("mainContent").innerHTML = `
<h2 style="text-align:center;">💪 6 Day Gym Split</h2>

<div id="progressText" style="margin:10px 0;text-align:center;font-weight:bold;"></div>

${makeDay("Day 1 - Chest",[
"Bench Press 4x8",
"Incline DB 3x10",
"Tricep Pushdown 3x12"
])}

${makeDay("Day 2 - Back",[
"Pullups 4x8",
"Barbell Row 3x10",
"Bicep Curl 3x12"
])}

${makeDay("Day 3 - Legs",[
"Squats 4x10",
"Leg Press 3x12",
"Calf Raise 4x15"
])}

<button onclick="location.reload()">⬅ Back</button>
`;

setupGym();

}

function makeDay(title, exercises){
let html = `<div style="background:#f9fafb;padding:15px;margin:10px 0;border-radius:15px;">`;
html += `<h4>${title}</h4>`;

exercises.forEach((ex,i)=>{
html += `
<label style="display:block;margin:5px 0;">
<input type="checkbox" class="gymBox">
${ex}
</label>
`;
});

html += `</div>`;
return html;
}

function setupGym(){

let boxes = document.querySelectorAll(".gymBox");

boxes.forEach((box,i)=>{
box.checked = localStorage.getItem("gym"+i) === "true";

box.addEventListener("change",()=>{
localStorage.setItem("gym"+i, box.checked);
updateGymProgress();
});
});

updateGymProgress();
}

function updateGymProgress(){

let boxes = document.querySelectorAll(".gymBox");
let total = boxes.length;
let done = 0;

boxes.forEach(b=>{
if(b.checked) done++;
});

let percent = total === 0 ? 0 : Math.round((done/total)*100);

document.getElementById("progressText").innerText =
"Workout Completed: " + percent + "%";

}

</script>

</body>
</html>
